<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ACSF World Cup 2026 — Group Stage Draw</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:ital,wght@0,300;0,400;0,600;0,700;1,300&display=swap');

        :root {
            --gold:      #c9a535;
            --gold-lt:   #f5d76e;
            --gold-dk:   #8a6a10;
            --bg:        #0b0c0e;
            --card2:     #111113;
            --slot-bg:   #1e1e20;
            --slot-fill: #2a2520;
            --dim:       #555;
            --white:     #f0ede8;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg);
            color: var(--white);
            font-family: 'Barlow Condensed', sans-serif;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* ── BG STREAKS ── */
        .bg-streaks { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
        .bg-streaks::before {
            content: ''; position: absolute; bottom: -10%; left: -5%; width: 80%; height: 70%;
            background: conic-gradient(from 30deg at 20% 90%, transparent 0deg, rgba(201,165,53,0.06) 8deg, transparent 16deg, transparent 30deg, rgba(201,165,53,0.04) 38deg, transparent 46deg);
            filter: blur(1px);
        }
        .bg-streaks::after {
            content: ''; position: absolute; bottom: -5%; right: -10%; width: 60%; height: 60%;
            background: conic-gradient(from -20deg at 80% 85%, transparent 0deg, rgba(201,165,53,0.05) 10deg, transparent 20deg, transparent 35deg, rgba(201,165,53,0.03) 45deg, transparent 55deg);
            filter: blur(1px);
        }
        .streak {
            position: absolute; height: 1px;
            background: linear-gradient(90deg, transparent, rgba(201,165,53,0.5), rgba(255,220,80,0.8), rgba(201,165,53,0.3), transparent);
            transform-origin: left center;
        }

        /* ── TOP BAR ── */
        .topbar {
            position: relative; z-index: 10;
            display: flex; align-items: center; justify-content: space-between;
            padding: 6px 18px;
            background: linear-gradient(180deg, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.6) 100%);
            border-bottom: 1px solid rgba(201,165,53,0.2);
            flex-shrink: 0; min-height: 54px;
        }
        .topbar-left { display: flex; align-items: center; gap: 12px; }
        .topbar-left img { height: 42px; width: auto; }
        .topbar-title { display: flex; flex-direction: column; }
        .topbar-title .org {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.5em; letter-spacing: 5px; color: var(--gold-lt); line-height: 1;
        }
        .topbar-title .sub {
            font-size: 0.6em; letter-spacing: 4px; color: var(--gold-dk);
            font-weight: 300; text-transform: uppercase; line-height: 1.4;
        }
        .topbar-right { display: flex; flex-direction: column; align-items: flex-end; gap: 5px; }
        #status {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1em; letter-spacing: 4px; color: var(--gold-lt); text-align: right;
            min-height: 1.2em;
        }
        .btn-row { display: flex; gap: 6px; align-items: center; }

        /* ── BUTTONS ── */
        button {
            font-family: 'Bebas Neue', sans-serif; letter-spacing: 2px; font-size: 0.9em;
            background: var(--gold); color: #000; border: none; padding: 7px 22px; cursor: pointer;
            transition: background 0.15s, transform 0.1s, opacity 0.2s;
            clip-path: polygon(5px 0%, 100% 0%, calc(100% - 5px) 100%, 0% 100%);
            white-space: nowrap;
        }
        button:hover:not(:disabled) { background: var(--gold-lt); }
        button:active:not(:disabled) { transform: scale(0.97); }
        button:disabled { background: #2a2820; color: #444; cursor: default; }

        button.sec {
            background: transparent;
            border: 1px solid rgba(201,165,53,0.45);
            color: var(--gold);
            clip-path: none;
            font-size: 0.78em;
            padding: 5px 14px;
        }
        button.sec:hover:not(:disabled) { background: rgba(201,165,53,0.08); }

        /* big action button — pulses when waiting for click */
        #actionBtn {
            font-size: 1em;
            padding: 8px 28px;
            position: relative;
            overflow: hidden;
        }
        #actionBtn.pulse {
            animation: btnpulse 1.6s ease-in-out infinite;
        }
        @keyframes btnpulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(201,165,53,0); }
            50%       { box-shadow: 0 0 14px 4px rgba(201,165,53,0.45); }
        }

        /* ── MAIN AREA ── */
        .main {
            position: relative; z-index: 5; flex: 1;
            display: flex; overflow: hidden; min-height: 0;
        }

        /* ── LEFT PANEL ── */
        .pot-panel {
            width: 230px; flex-shrink: 0;
            background: linear-gradient(180deg, rgba(0,0,0,0.85) 0%, rgba(10,8,5,0.9) 100%);
            border-right: 1px solid rgba(201,165,53,0.2);
            display: flex; flex-direction: column; overflow: hidden;
        }

        .pot-block {
            flex: 1; display: flex; flex-direction: column;
            border-bottom: 1px solid rgba(201,165,53,0.12); min-height: 0;
            transition: flex 0.45s ease, opacity 0.35s ease, max-height 0.45s ease;
            overflow: hidden;
        }
        .pot-block:last-child { border-bottom: none; }

        .pot-block.inactive {
            flex: 0 0 0px;
            opacity: 0;
            max-height: 0;
            border-bottom: none;
            pointer-events: none;
        }
        .pot-block.active-pot { flex: 1; }

        .pot-block-header {
            display: flex; align-items: center;
            background: rgba(0,0,0,0.5); flex-shrink: 0;
        }
        .pot-number-box {
            font-family: 'Bebas Neue', sans-serif; font-size: 1.1em; letter-spacing: 2px;
            color: #000; padding: 3px 10px; line-height: 1;
            min-width: 60px; text-align: center;
        }
        .pot-entries {
            flex: 1; overflow: hidden; display: flex;
            flex-direction: column; justify-content: space-around; padding: 2px 0;
        }
        .pot-entry {
            display: flex; align-items: center; height: 26px; padding: 0 8px;
            font-size: 0.72em; font-weight: 600; letter-spacing: 0.8px; text-transform: uppercase;
            transition: opacity 0.5s, filter 0.5s, background 0.3s, border-color 0.3s;
            background: linear-gradient(90deg, rgba(201,165,53,0.08), transparent);
            border-left: 2px solid rgba(201,165,53,0.3);
            margin: 1px 4px 1px 0; white-space: nowrap; overflow: hidden;
        }
        .pot-entry img { width: 22px; height: 15px; object-fit: contain; margin-right: 7px; flex-shrink: 0; }
        .pot-entry.empty-entry { color: #333; font-style: italic; border-left-color: #222; }
        .pot-entry.drawn { opacity: 0.14; filter: grayscale(1); }
        .pot-entry.current {
            background: rgba(201,165,53,0.22);
            border-left-color: var(--gold-lt);
        }

        /* ── CENTER REVEAL AREA ── */
        .center-area {
            flex: 1; display: flex; align-items: center; justify-content: center;
            position: relative; overflow: hidden;
        }

        /* WC logo shown before draw starts / between pots */
        .center-wc-logo {
            position: absolute; inset: 0;
            display: flex; align-items: center; justify-content: center;
            transition: opacity 0.5s ease;
        }
        .center-wc-logo img { height: 55%; max-height: 240px; opacity: 0.12; filter: grayscale(0.3); }
        .center-wc-logo.hidden { opacity: 0; pointer-events: none; }

        /* "POT X" announcement overlay shown when a new pot begins */
        .pot-announce {
            position: absolute; inset: 0;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center; gap: 6px;
            opacity: 0; pointer-events: none;
            transition: opacity 0.4s ease;
        }
        .pot-announce.visible { opacity: 1; }
        .pot-announce-label {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1em; letter-spacing: 6px; color: var(--gold-dk);
        }
        .pot-announce-number {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 7em; line-height: 0.85;
            letter-spacing: 12px;
            color: var(--gold-lt);
            text-shadow: 0 0 60px rgba(201,165,53,0.5);
        }

        /* Team reveal */
        .team-reveal {
            position: absolute; inset: 0;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center; gap: 14px;
            opacity: 0; transform: scale(0.9);
            transition: opacity 0.4s ease, transform 0.4s cubic-bezier(0.34,1.4,0.64,1);
            pointer-events: none;
        }
        .team-reveal.visible { opacity: 1; transform: scale(1); }
        .team-reveal.exit {
            opacity: 0; transform: scale(1.05);
            transition: opacity 0.22s ease, transform 0.22s ease;
        }

        .team-reveal-img {
            max-height: 50%; max-width: 68%; object-fit: contain;
            filter: drop-shadow(0 0 28px rgba(201,165,53,0.35));
        }
        .team-reveal-name {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 2.5em; letter-spacing: 8px;
            color: var(--white);
            text-shadow: 0 0 28px rgba(201,165,53,0.5);
            text-align: center; line-height: 1;
        }
        .team-reveal-group {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.05em; letter-spacing: 6px;
            color: var(--gold); text-align: center;
        }

        /* ── BOTTOM GROUPS ── */
        .groups-panel {
            position: relative; z-index: 5;
            background: linear-gradient(180deg, rgba(0,0,0,0.7), rgba(0,0,0,0.92));
            border-top: 2px solid rgba(201,165,53,0.35);
            flex-shrink: 0; padding: 8px 12px 10px;
        }
        .progress-wrap { height: 2px; background: rgba(255,255,255,0.05); margin-bottom: 8px; }
        #progress-bar {
            height: 2px;
            background: linear-gradient(90deg, var(--gold-dk), var(--gold), var(--gold-lt));
            width: 0%; transition: width 0.4s ease;
        }
        .groups-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 7px; }
        .group-card {
            background: var(--card2); border: 1px solid rgba(201,165,53,0.18); overflow: hidden;
            transition: border-color 0.3s, box-shadow 0.3s;
        }
        .group-card.draw-target { border-color: rgba(201,165,53,0.8); box-shadow: 0 0 12px rgba(201,165,53,0.25); }
        .group-card-header {
            background: linear-gradient(90deg, #1c1810, #2a2215);
            border-bottom: 1px solid rgba(201,165,53,0.25);
            display: flex; align-items: center; padding: 0;
        }
        .group-letter {
            font-family: 'Bebas Neue', sans-serif; font-size: 0.85em;
            letter-spacing: 3px; color: var(--gold-lt); padding: 4px 8px; line-height: 1;
        }
        .group-word {
            font-size: 0.55em; letter-spacing: 2px; color: var(--gold-dk);
            font-weight: 300; text-transform: uppercase; padding-left: 2px;
        }
        .slot {
            display: flex; align-items: center; height: 28px; padding: 0 6px;
            border-bottom: 1px solid rgba(255,255,255,0.03);
            font-size: 0.68em; font-weight: 600; letter-spacing: 0.8px;
            text-transform: uppercase; white-space: nowrap; overflow: hidden;
            background: var(--slot-bg); transition: background 0.25s, color 0.25s;
        }
        .slot:last-child { border-bottom: none; }
        .slot img { width: 20px; height: 13px; object-fit: contain; margin-right: 5px; flex-shrink: 0; }
        .slot.empty { background: linear-gradient(90deg, #161614, #111); color: #2e2e2e; }
        .slot-label { font-size: 0.8em; letter-spacing: 1px; color: #2a2a2a; font-weight: 400; }
        .slot.newly-drawn { background: #fff !important; color: #000 !important; font-weight: 700; }
        .slot.filled { background: var(--slot-fill); }
        .slot.p1 { border-left: 3px solid #c0392b; }
        .slot.p2 { border-left: 3px solid #2980b9; }
        .slot.p3 { border-left: 3px solid #27ae60; }
        .slot.p4 { border-left: 3px solid #8e44ad; }

        /* ── FLASH ── */
        .draw-flash {
            position: fixed; inset: 0; pointer-events: none;
            background: radial-gradient(circle at 50% 45%, rgba(201,165,53,0.2), transparent 65%);
            opacity: 0; z-index: 50;
        }
        .draw-flash.pop { animation: flashpop 0.55s ease-out forwards; }
        @keyframes flashpop { 0% { opacity: 1; } 100% { opacity: 0; } }
    </style>
</head>
<body>

<div class="bg-streaks" id="bg-streaks"></div>
<div class="draw-flash" id="flash"></div>

<!-- TOP BAR -->
<div class="topbar">
    <div class="topbar-left">
        <img src="https://upload.wikimedia.org/wikipedia/en/thumb/1/17/2026_FIFA_World_Cup_emblem.svg/250px-2026_FIFA_World_Cup_emblem.svg.png"

        <div class="topbar-title">
            <span class="org">ACSF World Cup 2026</span>
            <span class="sub">Group Stage Draw &nbsp;·&nbsp; 6 Groups of 4 &nbsp;·&nbsp; 4 Pots</span>
        </div>
    </div>
    <div class="topbar-right">
        <div id="status">PRESS START TO BEGIN</div>
        <div class="btn-row">
            <button id="actionBtn" class="pulse" onclick="handleAction()">Start Draw</button>
            <button class="sec" onclick="resetDraw()">Reset</button>
        </div>
    </div>
</div>

<!-- MAIN AREA -->
<div class="main">
    <div class="pot-panel" id="pot-panel"></div>

    <div class="center-area">

        <div class="center-wc-logo" id="center-wc-logo">
            <img src="https://upload.wikimedia.org/wikipedia/en/thumb/1/17/2026_FIFA_World_Cup_emblem.svg/250px-2026_FIFA_World_Cup_emblem.svg.png"
                 onerror="this.style.display='none'" alt="">
        </div>

        <!-- "POT X" announcement when a new pot begins -->
        <div class="pot-announce" id="pot-announce">
            <div class="pot-announce-label">NOW DRAWING</div>
            <div class="pot-announce-number" id="pot-announce-number">1</div>
        </div>

        <!-- Team reveal after slot animation completes -->
        <div class="team-reveal" id="team-reveal">
            <img class="team-reveal-img" id="reveal-img" src="" alt="">
            <div class="team-reveal-name" id="reveal-name"></div>
            <div class="team-reveal-group" id="reveal-group"></div>
        </div>
    </div>
</div>

<!-- BOTTOM GROUPS -->
<div class="groups-panel">
    <div class="progress-wrap"><div id="progress-bar"></div></div>
    <div class="groups-grid" id="groups-grid"></div>
</div>

    { name: "Norway",      logo: "https://upload.wikimedia.org/wikipedia/en/thumb/6/6c/Norway_national_football_team_logo.svg/960px-Norway_national_football_team_logo.svg.png", image: "https://static01.nyt.com/athletic/uploads/wp/2025/10/12074735/GettyImages-2240004132-scaled.jpg?width=1200&height=1200&fit=cover", pot: 1 },
    { name: "Senegal",     logo: "https://upload.wikimedia.org/wikipedia/en/1/16/Senegalese_Football_Federation_logo.svg", image: "https://www.reuters.com/resizer/v2/6XLKBX6P4FJQXPWRNWF3RGKGUA.jpg?auth=8e321d375744037ded4d86810968f1c37533041a256fba55c9fc00b0ce1fa000&width=1080&quality=80", pot: 1 },
    { name: "Uruguay",     logo: "https://logodownload.org/wp-content/uploads/2021/09/auf-seleccion-de-futbol-de-uruguay-logo-3.png", image: "https://a4.espncdn.com/combiner/i?img=%2Fphoto%2F2024%2F0629%2Fr1352300_1296x729_16%2D9.jpg", pot: 1 },
    // ── 3 more teams coming soon ──
];

const CONSTRAINTS = {
    "Poland":    [0, 1],
    "Argentina": [2, 3],
    "USA":       [4, 5],
};

// ═══════════════════════════════════════════════════════════════
const GROUPS     = ['A','B','C','D','E','F'];
const POT_COLORS = ['#c0392b','#2980b9','#27ae60','#8e44ad'];
const SLOT_ANIM_MS = 900;   // how long the white flash holds before reveal

// ── State machine ──
// phase: 'idle' | 'pot-announce' | 'drawing' | 'pot-done' | 'complete'
let phase        = 'idle';
let drawQueue    = [];
let drawIndex    = 0;
let currentPot   = 0;
let totalTeams   = 0;
let locked       = false;   // blocks button while animation plays
let groups       = [[],[],[],[],[],[]];

function teamsInPot(p) { return TEAMS.filter(t => t.pot === p); }
function safeid(n)      { return n.replace(/[^a-zA-Z0-9]/g,'_'); }
function potsInQueue()  { return [...new Set(drawQueue.map(d => d.pot))].sort(); }

// ── BUILD QUEUE ──
function buildDrawQueue() {
    drawQueue = [];
    let localGroups = [[],[],[],[],[],[]];

    function pickDraw(pot) {
        const available = teamsInPot(pot).slice();
        for (let i = available.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [available[i], available[j]] = [available[j], available[i]];
        }
        const assignments = new Array(available.length).fill(-1);
        const groupUsed   = new Array(6).fill(false);

        function bt(idx) {
            if (idx === available.length) return true;
            const team   = available[idx];
            const gOrder = [...Array(6).keys()].sort(() => Math.random() - 0.5);
            for (const g of gOrder) {
                if (groupUsed[g]) continue;
                if (localGroups[g].some(t => t.pot === pot)) continue;
                if (localGroups[g].length >= 4) continue;
                if ((CONSTRAINTS[team.name]||[]).includes(g)) continue;
                assignments[idx] = g; groupUsed[g] = true; localGroups[g].push(team);
                if (bt(idx + 1)) return true;
                localGroups[g].pop(); groupUsed[g] = false; assignments[idx] = -1;
            }
            return false;
        }
        if (!bt(0)) return false;
        const draws = available.map((t,i) => ({ team:t, group:assignments[i] }));
        draws.sort((a,b) => a.group - b.group);
        return draws;
    }

    for (let attempt = 0; attempt < 20; attempt++) {
        localGroups = [[],[],[],[],[],[]];
        let all = [], ok = true;
        for (const pot of [1,2,3,4]) {
            if (!teamsInPot(pot).length) continue;
            const res = pickDraw(pot);
            if (!res) { ok = false; break; }
            res.forEach(d => { if (!localGroups[d.group].some(t=>t.name===d.team.name)) localGroups[d.group].push(d.team); });
            all = all.concat(res.map(d => ({...d, pot})));
        }
        if (ok) { drawQueue = all; return true; }
    }
    return false;
}

// ── INIT ──
function init() {
    totalTeams = TEAMS.length;
    phase      = 'idle';
    drawIndex  = 0;
    currentPot = 0;
    locked     = false;
    groups     = [[],[],[],[],[],[]];

    buildStreaks();

    // Pot panel: all 4 visible
    const panel = document.getElementById('pot-panel');
    panel.innerHTML = '';
    [1,2,3,4].forEach(pot => {
        const teams = teamsInPot(pot);
        const block = document.createElement('div');
        block.className = 'pot-block';
        block.id = `pot-block-${pot}`;
        const entries = teams.length
            ? teams.map(t => `<div class="pot-entry" id="pi-${safeid(t.name)}">
                ${t.logo ? `<img src="${t.logo}" onerror="this.style.display='none'">` : ''}${t.name}
              </div>`).join('')
            : `<div class="pot-entry empty-entry">— No teams yet —</div>`;
        block.innerHTML = `
            <div class="pot-block-header">
                <div class="pot-number-box" style="background:${POT_COLORS[pot-1]}">POT ${pot}</div>
            </div>
            <div class="pot-entries">${entries}</div>`;
        panel.appendChild(block);
    });

    // Groups grid
    const grid = document.getElementById('groups-grid');
    grid.innerHTML = '';
    GROUPS.forEach((g,i) => {
        const card = document.createElement('div');
        card.className = 'group-card'; card.id = `group-card-${i}`;
        card.innerHTML = `
            <div class="group-card-header">
                <span class="group-word">GROUP</span><span class="group-letter">&nbsp;${g}</span>
            </div>
            <div class="group-slots">
                ${[1,2,3,4].map(p=>`<div class="slot empty" id="g${i}-s${p-1}"><span class="slot-label">POT ${p}</span></div>`).join('')}
            </div>`;
        grid.appendChild(card);
    });

    // Reset center
    hideReveal();
    hidePotAnnounce();
    document.getElementById('center-wc-logo').classList.remove('hidden');

    if (TEAMS.length > 0) buildDrawQueue();
    updateProgress();

    setActionBtn('Start Draw', true, TEAMS.length > 0);
    document.getElementById('status').innerText = TEAMS.length > 0 ? 'PRESS START TO BEGIN' : 'ADD TEAMS TO BEGIN';
}

// ── BUTTON STATE ──
function setActionBtn(label, pulse, enabled) {
    const btn = document.getElementById('actionBtn');
    btn.textContent = label;
    btn.disabled = !enabled;
    if (pulse && enabled) btn.classList.add('pulse');
    else btn.classList.remove('pulse');
}

// ── PROGRESS ──
function updateProgress() {
    document.getElementById('progress-bar').style.width =
        totalTeams > 0 ? (drawIndex / totalTeams * 100) + '%' : '0%';
}

// ── FLASH ──
function flashEffect() {
    const f = document.getElementById('flash');
    f.classList.remove('pop'); void f.offsetWidth; f.classList.add('pop');
}

// ── GROUP CARD HIGHLIGHT ──
function highlightCard(gIdx) {
    document.querySelectorAll('.group-card').forEach(c => c.classList.remove('draw-target'));
    const card = document.getElementById(`group-card-${gIdx}`);
    if (card) { card.classList.add('draw-target'); setTimeout(() => card.classList.remove('draw-target'), 1400); }
}

// ── POT PANEL SWITCH ──
function activatePotPanel(pot) {
    for (let p = 1; p <= 4; p++) {
        const block = document.getElementById(`pot-block-${p}`);
        if (!block) continue;
        if (p === pot) { block.classList.remove('inactive'); block.classList.add('active-pot'); }
        else           { block.classList.remove('active-pot'); block.classList.add('inactive'); }
    }
}

function restoreAllPotPanels() {
    for (let p = 1; p <= 4; p++) {
        const block = document.getElementById(`pot-block-${p}`);
        if (block) block.classList.remove('inactive','active-pot');
    }
}

// ── CENTER VIEWS ──
function showPotAnnounce(pot) {
    document.getElementById('center-wc-logo').classList.add('hidden');
    hideReveal();
    document.getElementById('pot-announce-number').textContent = pot;
    document.getElementById('pot-announce').classList.add('visible');
}
function hidePotAnnounce() {
    document.getElementById('pot-announce').classList.remove('visible');
}

function hideReveal() {
    const r = document.getElementById('team-reveal');
    r.classList.remove('visible','exit');
}

function showTeamReveal(team, groupLetter) {
    hidePotAnnounce();
    document.getElementById('center-wc-logo').classList.add('hidden');

    const reveal  = document.getElementById('team-reveal');
    const imgEl   = document.getElementById('reveal-img');
    const nameEl  = document.getElementById('reveal-name');
    const groupEl = document.getElementById('reveal-group');

    function applyContent() {
        if (team.image) {
            imgEl.src = team.image;
            imgEl.style.display = '';
            imgEl.onerror = () => imgEl.style.display = 'none';
        } else {
            imgEl.style.display = 'none';
        }
        nameEl.textContent  = team.name;
        groupEl.textContent = `→  GROUP ${groupLetter}`;
    }

    if (reveal.classList.contains('visible')) {
        reveal.classList.add('exit');
        reveal.classList.remove('visible');
        setTimeout(() => {
            reveal.classList.remove('exit');
            applyContent();
            void reveal.offsetWidth;
            reveal.classList.add('visible');
        }, 240);
    } else {
        applyContent();
        void reveal.offsetWidth;
        reveal.classList.add('visible');
    }
}

// ── PLACE TEAM IN SLOT ──
// Returns a promise that resolves after the slot animation finishes
function placeTeamAnimated(team, gIdx) {
    return new Promise(resolve => {
        const slot = document.getElementById(`g${gIdx}-s${team.pot - 1}`);
        if (!slot) { resolve(); return; }

        slot.className = `slot p${team.pot} newly-drawn`;
        slot.innerHTML = `${team.logo ? `<img src="${team.logo}" onerror="this.style.display='none'">` : ''}${team.name}`;

        // Mark in pot list as current (briefly), then drawn
        const pi = document.getElementById(`pi-${safeid(team.name)}`);
        if (pi) { pi.classList.add('current'); }

        flashEffect();
        highlightCard(gIdx);
        groups[gIdx].push(team);

        setTimeout(() => {
            slot.classList.remove('newly-drawn');
            slot.classList.add('filled');
            if (pi) { pi.classList.remove('current'); pi.classList.add('drawn'); }
            resolve();   // animation done — caller can now show image
        }, SLOT_ANIM_MS);
    });
}

// ── MAIN ACTION HANDLER ──
async function handleAction() {
    if (locked) return;

    if (phase === 'idle') {
        // Find first pot that has teams
        const firstPot = [1,2,3,4].find(p => teamsInPot(p).length > 0);
        if (!firstPot) return;
        currentPot = firstPot;
        phase = 'pot-announce';
        activatePotPanel(currentPot);
        showPotAnnounce(currentPot);
        document.getElementById('status').innerText = `POT ${currentPot}  —  PRESS DRAW`;
        setActionBtn('Draw', true, true);
        phase = 'drawing';
        return;
    }

    if (phase === 'drawing') {
        // Find next item in queue that belongs to currentPot
        if (drawIndex >= drawQueue.length) { checkPotComplete(); return; }

        const entry = drawQueue[drawIndex];
        if (entry.pot !== currentPot) { checkPotComplete(); return; }

        locked = true;
        setActionBtn('Draw', false, false);
        drawIndex++;

        await placeTeamAnimated(entry.team, entry.group);

        // Slot is now filled — show reveal
        showTeamReveal(entry.team, GROUPS[entry.group]);
        document.getElementById('status').innerText = `${entry.team.name}  →  GROUP ${GROUPS[entry.group]}`;
        updateProgress();

        locked = false;

        // Check if this pot is now exhausted
        const remaining = drawQueue.slice(drawIndex).filter(d => d.pot === currentPot).length;
        if (remaining === 0) {
            checkPotComplete();
        } else {
            setActionBtn('Draw', true, true);
        }
        return;
    }

    if (phase === 'pot-done') {
        // Advance to next pot
        const nextPot = [1,2,3,4].find(p => p > currentPot && teamsInPot(p).length > 0);
        if (!nextPot) {
            // All pots done
            phase = 'complete';
            setActionBtn('Draw', false, false);
            document.getElementById('status').innerText = '✦  DRAW COMPLETE  ✦';
            return;
        }
        currentPot = nextPot;
        phase = 'drawing';
        activatePotPanel(currentPot);
        showPotAnnounce(currentPot);
        document.getElementById('status').innerText = `POT ${currentPot}  —  PRESS DRAW`;
        setActionBtn('Draw', true, true);
        return;
    }
}

function checkPotComplete() {
    const remaining = drawQueue.slice(drawIndex).filter(d => d.pot === currentPot).length;
    if (remaining === 0) {
        const hasMore = [1,2,3,4].some(p => p > currentPot && teamsInPot(p).length > 0);
        if (hasMore) {
            phase = 'pot-done';
            document.getElementById('status').innerText = `POT ${currentPot} COMPLETE  —  PRESS FOR POT ${[1,2,3,4].find(p => p > currentPot && teamsInPot(p).length > 0)}`;
            setActionBtn('Next Pot', true, true);
        } else {
            phase = 'complete';
            setActionBtn('Draw', false, false);
            document.getElementById('status').innerText = '✦  DRAW COMPLETE  ✦';
        }
    }
}

function resetDraw() {
    locked = false;
    restoreAllPotPanels();
    init();
}

// ── BACKGROUND STREAKS ──
function buildStreaks() {
    const c = document.getElementById('bg-streaks');
    // Only add streaks once
    if (c.querySelector('.streak')) return;
    [
        { bottom:'12%', left:'-5%',  width:'55%', angle:'-18deg', opacity:0.55 },
        { bottom:'18%', left:'-5%',  width:'45%', angle:'-22deg', opacity:0.3  },
        { bottom:'8%',  left:'-5%',  width:'40%', angle:'-14deg', opacity:0.2  },
        { bottom:'28%', right:'-5%', width:'50%', angle:'16deg',  opacity:0.4, fromRight:true },
        { bottom:'20%', right:'-5%', width:'38%', angle:'20deg',  opacity:0.2, fromRight:true },
    ].forEach(s => {
        const el = document.createElement('div');
        el.className = 'streak';
        el.style.cssText = `bottom:${s.bottom};${s.fromRight?`right:${s.right}`:`left:${s.left}`};width:${s.width};opacity:${s.opacity};transform:rotate(${s.angle});`;
        c.appendChild(el);
    });
}

init();
</script>
